<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="作业守护者">
    <title>作业守护者 - AI辅导助手</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- 设置页面（首次使用） -->
    <div id="setup-screen" class="screen">
        <div class="setup-container">
            <h1>🎓 作业守护者</h1>
            <p class="subtitle">AI 驱动的智能辅导助手</p>
            
            <div class="setup-form">
                <label for="api-key">OpenRouter API Key</label>
                <input type="password" id="api-key" placeholder="输入你的 API Key">
                <small>获取方式：访问 openrouter.ai</small>
                
                <label for="bailian-key">阿里云百炼 API Key（语音识别）</label>
                <input type="password" id="bailian-key" placeholder="输入百炼 API Key">
                <small>获取方式：访问 dashscope.aliyun.com</small>
                
                <label for="child-name">孩子名字（可选）</label>
                <input type="text" id="child-name" placeholder="例如：小明">
                
                <button id="save-settings" class="primary-btn">开始使用</button>
                
                <button id="test-tts-btn" onclick="
 window.speechSynthesis.cancel();
 var u = new SpeechSynthesisUtterance('你好，我是作业守护者');
 u.lang = 'zh-CN';
 u.volume = 1.0;
 window.speechSynthesis.speak(u);
 this.textContent = '已点击，等待声音...';
" style="margin-top:10px;width:100%;padding:10px;background:#666;color:white;border:none;border-radius:8px;font-size:16px">
 🔊 点击测试语音
</button>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-screen" class="screen hidden">
        <!-- Tab 1: 守护 -->
        <div id="tab-guardian" class="tab-content active">
            <div class="camera-container">
                <video id="camera-video" autoplay playsinline></video>
                <canvas id="camera-canvas" style="display:none;"></canvas>
                
                <div class="attention-overlay">
                    <div class="status-badge" id="attention-status">
                        <span class="status-icon">⏳</span>
                        <span class="status-text">初始化中...</span>
                    </div>
                    
                    <div class="focus-timer">
                        <span class="timer-label">专注时长</span>
                        <span class="timer-value" id="focus-duration">00:00</span>
                    </div>
                </div>
                
                <div class="camera-controls">
                    <button id="toggle-camera" class="icon-btn">
                        <span>🔄</span>
                        <small>切换摄像头</small>
                    </button>
                    <button id="capture-photo" class="icon-btn">
                        <span>📸</span>
                        <small>拍照分析</small>
                    </button>
                </div>
            </div>
        </div>

        <!-- Tab 2: 问问 -->
        <div id="tab-question" class="tab-content">
            <button onclick="
var key = localStorage.getItem('groq_api_key');
if(!key){ alert('Groq Key 为空！'); return; }
alert('Key前缀: ' + key.substring(0,8));
" style="position:fixed;top:100px;right:10px;z-index:9999;background:red;color:white;padding:10px;border:none;border-radius:8px;">
🔑 检查Key
</button>
            
            <button onclick="
(async function(){
 var key = localStorage.getItem('groq_api_key');
 var blob = new Blob(['test'], {type:'audio/webm'});
 var fd = new FormData();
 fd.append('file', blob, 'test.webm');
 fd.append('model', 'whisper-large-v3-turbo');
 try {
 var r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
 method:'POST',
 headers:{'Authorization':'Bearer '+key},
 body:fd
 });
 var t = await r.text();
 alert('状态:' + r.status + ' 返回:' + t.substring(0,100));
 } catch(e) {
 alert('异常:' + e.message);
 }
})();
" style="position:fixed;top:150px;right:10px;z-index:9999;background:blue;color:white;padding:10px;border:none;border-radius:8px;">
🌐 测试Groq
</button>
            
            <div class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="welcome-message">
                        <p>👋 你好！我是 AI 小助手</p>
                        <p>遇到难题可以问我哦~</p>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <button id="voice-ask-btn" class="voice-btn">
                        <span class="voice-icon">🎤</span>
                        <span class="voice-text">按住说话</span>
                    </button>
                    
                    <div class="text-input-group">
                        <input type="text" id="text-input" placeholder="或者打字提问...">
                        <button id="send-text-btn" class="send-btn">发送</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 3: 报告 -->
        <div id="tab-report" class="tab-content">
            <div class="report-container">
                <h2>📊 今日学习报告</h2>
                <div class="report-date" id="report-date"></div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">⏱️</div>
                        <div class="stat-value" id="total-focus-time">0分钟</div>
                        <div class="stat-label">累计专注</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">😴</div>
                        <div class="stat-value" id="distraction-count">0次</div>
                        <div class="stat-label">走神次数</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">❓</div>
                        <div class="stat-value" id="question-count">0个</div>
                        <div class="stat-label">提问数量</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-value" id="homework-score">待评估</div>
                        <div class="stat-label">作业质量</div>
                    </div>
                </div>
                
                <div class="timeline-section">
                    <h3>今日时间线</h3>
                    <div id="timeline-list" class="timeline-list">
                        <!-- 动态填充 -->
                    </div>
                </div>
                
                <button id="reset-report-btn" class="secondary-btn">重置统计</button>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="guardian">
                <span class="nav-icon">👁️</span>
                <span class="nav-label">守护</span>
            </button>
            <button class="nav-item" data-tab="question">
                <span class="nav-icon">💬</span>
                <span class="nav-label">问问</span>
            </button>
            <button class="nav-item" data-tab="report">
                <span class="nav-icon">📊</span>
                <span class="nav-label">报告</span>
            </button>
        </nav>
    </div>

    <!-- 加载提示 -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text">加载中...</p>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- 依赖库（本地） -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

    <!-- 应用脚本 -->
    <script src="js/camera.js"></script>
    <script src="js/attention.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

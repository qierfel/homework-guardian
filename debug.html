<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TF 调试</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px;font-size:14px">
<h3>TensorFlow.js 人脸检测测试</h3>
<video id="video" width="320" height="240" autoplay playsinline style="display:block;margin:10px 0"></video>
<div id="log"></div>
<script>
function log(msg) {
 document.getElementById('log').innerHTML += '<br>' + new Date().toLocaleTimeString() + ' ' + msg;
}

async function init() {
 log('加载 TensorFlow.js...');
 await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js');
 log('✅ TF.js 加载成功，版本: ' + tf.version.tfjs);
 await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js');
 log('✅ BlazeFace 加载成功');
 log('加载人脸检测模型...');
 const model = await blazeface.load();
 log('✅ 模型加载完成！');
 const video = document.getElementById('video');
 try {
 const stream = await navigator.mediaDevices.getUserMedia({video: true});
 video.srcObject = stream;
 await new Promise(r => video.onloadedmetadata = r);
 log('✅ 摄像头启动');
 } catch(e) {
 log('⚠️ 摄像头失败: ' + e.name + ' - ' + e.message);
 log('继续测试模型检测...');
 // 用静态图片测试模型是否正常
 const testTensor = tf.zeros([1, 128, 128, 3]);
 log('模型测试张量创建: ' + testTensor.shape);
 testTensor.dispose();
 log('✅ 模型可正常工作，摄像头问题是权限/环境问题');
 }
 setInterval(async () => {
 const faces = await model.estimateFaces(video, false);
 log('人脸数量: ' + faces.length + (faces.length > 0 ? ' ✅' : ' ❌'));
 }, 2000);
}

function loadScript(src) {
 return new Promise((resolve, reject) => {
 const s = document.createElement('script');
 s.src = src;
 s.onload = resolve;
 s.onerror = () => reject('加载失败: ' + src);
 document.head.appendChild(s);
 });
}

init().catch(e => log('❌ 错误: ' + e));
</script>
</body>
</html>
